services:
  restaurantos-local:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        REACT_APP_API_URL: /api
        REACT_APP_SOCKET_URL: http://localhost:5051
    container_name: restaurantos-local
    restart: unless-stopped
    ports:
      - "5051:5001"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5001
      DEPLOYMENT_MODE: local_offline
      DB_MODE: local
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: restaurantos
      DB_USER: postgres
      DB_PASSWORD: ${LOCAL_DB_PASSWORD:-mawgif7414}
      DEVICE_ID: ${DEVICE_ID:-LOCAL-POS-01}
      BRANCH_CODE: ${BRANCH_CODE:-LOCAL}
      DEVICE_LABEL: ${DEVICE_LABEL:-RestaurantOS Local POS}
      CLOUD_API_URL: ${CLOUD_API_URL:-}
      JWT_SECRET: ${JWT_SECRET:-restaurantos_jwt_secret_change_in_production_min32chars}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-restaurantos_refresh_secret_change_in_production_32c}
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5051
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 5
    volumes:
      - ./backend/uploads:/app/backend/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
